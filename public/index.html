<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rainfall Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 {
            margin-bottom: 20px;
            font-weight: 700;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }
        input::placeholder {
            color: #888;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.03);
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 500;
        }
        .error {
            color: #ffcccc;
            margin-top: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">🌧️</div>
    <h1>Rainfall Predictor</h1>
    <form id="predict-form">
        <input type="number" step="any" id="temperature" placeholder="🌡️ Temperature (°C)" required>
        <input type="number" step="any" id="humidity" placeholder="💧 Humidity (%)" required>
        <input type="number" step="any" id="pressure" placeholder="🌪️ Pressure (hPa)" required>
        <button type="submit">Predict</button>
    </form>
    <div id="result" class="result"></div>
    <div id="error" class="error"></div>
</div>
<script>
    const form = document.getElementById('predict-form');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('error');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        resultDiv.textContent = '';
        errorDiv.textContent = '';

        const payload = {
            temperature_c: parseFloat(document.getElementById('temperature').value),
            humidity_pct: parseFloat(document.getElementById('humidity').value),
            pressure_hpa: parseFloat(document.getElementById('pressure').value)
        };

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || 'Prediction failed');
            }
            resultDiv.textContent = `${data.message} (prediction=${data.prediction}${data.probability !== null ? `, probability=${data.probability.toFixed(2)}` : ''})`;
        } catch (err) {
            errorDiv.textContent = err.message;
        }
    });
</script>
</body>
</html>
